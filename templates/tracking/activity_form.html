{% extends "base.html" %}
{% block title %}Nueva Actividad - Salud App{% endblock %}
{% block content %}
    <div class="row">
        <div class="col-md-6 offset-md-3">
            <div class="card">
                <div class="card-header">Nueva Actividad Física</div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label">Nombre (ej. Andar, Gimnasio, Karate)</label>
                            {{ form.name }}
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Descripción</label>
                            {{ form.description }}
                        </div>
                        <button type="submit" class="btn btn-warning w-100">Guardar</button>
                    </form>
                </div>
            </div>
            <a href="{% url 'activity_list' %}" class="btn btn-link mt-2">← Volver</a>
        </div>
    </div>
{% endblock %}
